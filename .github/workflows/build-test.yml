name: Build and Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v3

      - name: Setup OCaml cache
        id: setup-cache
        uses: actions/cache@v3
        with:
          path: |
            ~/.opam
            _opam
            /usr/local/bin/opam
            /home/runner/.local/bin/opam
          key: ${{ runner.os }}-ocaml-${{ hashFiles('*.opam', '**/*.opam') }}-v2

      - name: Set up OCaml environment
        if: steps.setup-cache.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y bubblewrap
          wget https://github.com/ocaml/opam/releases/download/2.1.5/opam-2.1.5-x86_64-linux -O /tmp/opam
          sudo mv /tmp/opam /usr/local/bin/opam
          sudo chmod +x /usr/local/bin/opam
          opam init --disable-sandboxing --no-setup --compiler=ocaml-base-compiler.5.1.1 -y
          opam install dune alcotest -y

      - name: Build
        run: |
          eval $(opam env)
          dune build src/churing.exe

      - name: Run unit tests
        run: |
          eval $(opam env)
          dune runtest

      - name: Run integration tests
        run: |
          eval $(opam env)
          mkdir -p test_results
          failed=0
          for test_file in src/test/*.ch; do
            test_name=$(basename "$test_file" .ch)
            expected_output="src/test/${test_name}.ch.out"

            _build/default/src/churing.exe "$test_file" > "test_results/${test_name}.out" 2>&1
            exit_code=$?

            if [ -f "$expected_output" ]; then
              if ! diff -u "test_results/${test_name}.out" "$expected_output"; then
                echo "FAIL: $test_name"
                failed=1
              else
                echo "PASS: $test_name"
              fi
            elif [ "$exit_code" -ne 0 ]; then
              echo "FAIL: $test_name (exit code $exit_code)"
              cat "test_results/${test_name}.out"
              failed=1
            else
              echo "PASS: $test_name"
            fi
          done
          if [ "$failed" -eq 1 ]; then
            echo "Some tests failed!"
            exit 1
          fi
